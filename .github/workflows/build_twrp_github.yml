name: Build TWRP Recovery Image (GitHub-hosted)

on:
  workflow_dispatch:
    inputs:
      IMG_URL:
        description: 'URL to recovery.img (raw link). Leave default to use repo image.'
        required: true
        default: ''
      TWRP_BRANCH:
        description: 'TWRP manifest branch'
        required: true
        default: 'twrp-12.1'

env:
  JAVA_HOME: /usr/lib/jvm/java-11-openjdk-amd64
  GIT_LFS_SKIP_SMUDGE: "1"
  DEBIAN_FRONTEND: noninteractive

jobs:
  build-twrp:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Free disk space
        run: |
          echo "=== Before cleanup ==="
          df -h /
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/boost /usr/local/share/powershell /usr/share/swift /usr/lib/jvm/java-8-openjdk-amd64 /usr/lib/jvm/java-13-openjdk-amd64 /usr/lib/jvm/java-15-openjdk-amd64 /usr/lib/jvm/java-17-openjdk-amd64 /usr/lib/jvm/java-21-openjdk-amd64 2>/dev/null || true
          sudo apt-get purge -y 'ghc-*' 'cabal-*' 'dotnet-*' 'llvm-*' 'powershell*' 'mono-*' 'ruby*' 2>/dev/null || true
          sudo apt-get autoremove -y --purge 2>/dev/null || true
          sudo apt-get clean
          docker images -q 2>/dev/null | xargs -r sudo docker rmi -f 2>/dev/null || true
          echo "=== After cleanup ==="
          df -h /

      - name: Install build dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            openjdk-11-jdk git git-lfs \
            python3 python3-pip \
            libncurses-dev libssl-dev libreadline-dev \
            flex bison g++-multilib \
            zip unzip cpio wget curl lz4 xxd \
            build-essential bc rsync
          sudo curl -sSL https://storage.googleapis.com/git-repo-downloads/repo -o /usr/local/bin/repo
          sudo chmod +x /usr/local/bin/repo
          repo --version 2>&1 | head -3

      - name: Increase swap
        run: |
          sudo swapoff -a || true
          sudo fallocate -l 16G /swapfile
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
          free -h
          df -h /

      - name: Configure git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --global color.ui false

      - name: Show mirror strategy
        run: |
          echo "GitHub-hosted runner is outside mainland China; using source googlesource directly (no url.insteadOf rewrite)."
          df -h /

      - name: Init TWRP source
        run: |
          mkdir -p twrp-src
          cd twrp-src
          repo init -u https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp.git -b ${{ inputs.TWRP_BRANCH }} --depth=1 --no-tags

      - name: Sync TWRP source
        run: |
          cd twrp-src
          for i in 1 2 3; do
            echo "=== repo sync attempt $i ==="
            if repo sync -c -j8 --no-clone-bundle --no-tags; then
              echo "repo sync SUCCESS"
              break
            fi
            echo "attempt $i failed, retrying in 30s..."
            sleep 30
            if [ $i -eq 3 ]; then
              echo "repo sync FAILED after 3 attempts"
              exit 1
            fi
          done
          test -f build/envsetup.sh
          echo "=== Disk after sync ==="
          df -h /
          du -sh "$GITHUB_WORKSPACE/twrp-src"

      - name: Prune .repo to free space
        run: |
          cd twrp-src
          du -sh .repo 2>/dev/null || true
          rm -rf .repo
          df -h /

      - name: Install twrpdtgen
        run: |
          pip3 install --upgrade twrpdtgen
          python3 -m twrpdtgen --help 2>&1 | head -3

      - name: Prepare recovery image
        run: |
          if [ -f recovery.img ]; then
            echo "Using recovery.img from repository"
          elif [ -n "${{ inputs.IMG_URL }}" ]; then
            wget -O recovery.img "${{ inputs.IMG_URL }}"
          else
            echo "ERROR: recovery.img not in repo and IMG_URL is empty" >&2
            exit 1
          fi
          file recovery.img

      - name: Generate device tree
        run: |
          mkdir -p device_tree_output
          python3 -m twrpdtgen -o device_tree_output recovery.img
          DEV_TREE=$(find device_tree_output -name AndroidProducts.mk -printf '%h\n' | head -1)
          REL=$(echo "$DEV_TREE" | sed 's|device_tree_output/||')
          echo "DEV_REL=$REL" >> $GITHUB_ENV
          echo "Generated device tree: $REL"
          echo "=== Files in generated device tree ==="
          find device_tree_output -type f -printf '  %p (%s bytes)\n'

      - name: Patch device tree for minimal-manifest-twrp
        run: |
          # minimal-manifest-twrp ships vendor/twrp (not vendor/omni).
          # twrpdtgen 3.0.0 generates makefiles that inherit vendor/omni/config/common.mk
          # and uses omni_<dev>.mk naming. Patch the generated tree so it works with
          # the minimal manifest:
          #   1. Replace vendor/omni references with vendor/twrp in all .mk files
          #   2. Rename omni_<dev>.mk -> twrp_<dev>.mk
          #   3. Update AndroidProducts.mk and vendorsetup.sh to use twrp_ prefix
          DT_DIR="device_tree_output/${{ env.DEV_REL }}"
          echo "Patching device tree in: $DT_DIR"
          # 1. Replace vendor/omni -> vendor/twrp in all .mk files
          find "$DT_DIR" -type f -name '*.mk' -print0 | xargs -0 sed -i 's|vendor/omni|vendor/twrp|g'
          # 2. Rename omni_<dev>.mk -> twrp_<dev>.mk
          for f in "$DT_DIR"/omni_*.mk; do
            [ -e "$f" ] || continue
            new_f="$(echo "$f" | sed 's|/omni_|/twrp_|')"
            mv "$f" "$new_f"
            echo "Renamed: $(basename "$f") -> $(basename "$new_f")"
          done
          # 3. Update AndroidProducts.mk to reference twrp_*.mk
          if [ -f "$DT_DIR/AndroidProducts.mk" ]; then
            sed -i 's|omni_|twrp_|g' "$DT_DIR/AndroidProducts.mk"
            echo "=== AndroidProducts.mk after patch ==="
            cat "$DT_DIR/AndroidProducts.mk"
          fi
          # 4. Update vendorsetup.sh if present
          if [ -f "$DT_DIR/vendorsetup.sh" ]; then
            sed -i 's|omni_|twrp_|g' "$DT_DIR/vendorsetup.sh"
            echo "=== vendorsetup.sh after patch ==="
            cat "$DT_DIR/vendorsetup.sh"
          fi
          echo "=== Final file listing ==="
          find "$DT_DIR" -type f -printf '  %p\n'

      - name: Install device tree into source
        run: |
          mkdir -p twrp-src/device/$(dirname ${{ env.DEV_REL }})
          cp -r device_tree_output/${{ env.DEV_REL }} twrp-src/device/${{ env.DEV_REL }}
          ls -la twrp-src/device/${{ env.DEV_REL }}
          rm -rf device_tree_output

      - name: Determine lunch target
        run: |
          cd twrp-src/device/${{ env.DEV_REL }}
          LUNCH_DEVICE=$(grep -oP 'twrp_\K[a-zA-Z0-9_\-]+(?=\.mk)' AndroidProducts.mk | head -1)
          if [ -z "$LUNCH_DEVICE" ]; then
            LUNCH_DEVICE=$(grep -oP 'omni_\K[a-zA-Z0-9_\-]+(?=\.mk)' AndroidProducts.mk | head -1)
            echo "LUNCH_TARGET=omni_${LUNCH_DEVICE}-userdebug" >> $GITHUB_ENV
          else
            echo "LUNCH_TARGET=twrp_${LUNCH_DEVICE}-userdebug" >> $GITHUB_ENV
          fi
          echo "Lunch target: ${{ env.LUNCH_TARGET }}"

      - name: Build TWRP recovery image
        run: |
          cd twrp-src
          source build/envsetup.sh
          lunch ${{ env.LUNCH_TARGET }}
          m recoveryimage -j4
          df -h /

      - name: Collect recovery image
        run: |
          mkdir -p artifacts
          IMG_PATH=$(find twrp-src/out/target/product -name recovery.img | head -1)
          echo "Found recovery.img at: $IMG_PATH"
          cp "$IMG_PATH" artifacts/recovery.img
          sha256sum artifacts/recovery.img > artifacts/recovery.img.sha256
          file artifacts/recovery.img
          ls -lh artifacts/

      - name: Upload recovery image artifact
        uses: actions/upload-artifact@v4
        with:
          name: twrp-recovery-${{ github.run_number }}
          path: artifacts/recovery.img
          retention-days: 7

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/recovery.img
            artifacts/recovery.img.sha256
          name: TWRP_Recovery_GH_${{ github.run_number }}
          tag_name: twrp-gh-${{ github.run_number }}
          body: |
            TWRP ${{ inputs.TWRP_BRANCH }} recovery image built on GitHub-hosted runner

            Build run: ${{ github.run_number }}
            Source image: ${{ inputs.IMG_URL }}
            Runner: ubuntu-latest (GitHub-hosted, single job)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
